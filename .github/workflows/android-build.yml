name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platform 35 & build-tools 35.0.0
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      # ------------------------------------------------------------------
      # local.properties: SDK dir + optional API token. If the token secret
      # is missing, a safe placeholder is written and the app uses demo data.
      # ------------------------------------------------------------------
      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "FOOTBALL_API_BASE_URL=https://api.football-data.org/v4" >> local.properties
          if [ -n "${{ secrets.FOOTBALL_DATA_API_TOKEN }}" ]; then
            echo "FOOTBALL_DATA_API_TOKEN=${{ secrets.FOOTBALL_DATA_API_TOKEN }}" >> local.properties
          else
            echo "FOOTBALL_DATA_API_TOKEN=your_api_token_here" >> local.properties
          fi

      # ------------------------------------------------------------------
      # Decode the release keystore from GitHub Secrets. Never committed.
      # ------------------------------------------------------------------
      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ERROR: ANDROID_KEYSTORE_BASE64 secret is not set. A real release keystore is required."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release-key.p12"

      - name: Set up Gradle & generate wrapper
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Generate Gradle wrapper (if missing)
        run: gradle wrapper --gradle-version 8.9

      # ------------------------------------------------------------------
      # Build signed release APK and AAB. Signing credentials are provided
      # only through environment variables sourced from GitHub Secrets.
      # ------------------------------------------------------------------
      - name: Build signed release APK & AAB
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release-key.p12
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          FOOTBALL_DATA_API_TOKEN: ${{ secrets.FOOTBALL_DATA_API_TOKEN }}
          FOOTBALL_API_BASE_URL: https://api.football-data.org/v4
        run: |
          ./gradlew :app:assembleRelease :app:bundleRelease --no-daemon --stacktrace

      # ------------------------------------------------------------------
      # Verify the release APK is NOT signed with a debug certificate.
      # Fails the build if the signing cert contains CN=Android Debug.
      # ------------------------------------------------------------------
      - name: Verify APK signing certificate
        run: |
          APKSIGNER="$ANDROID_SDK_ROOT/build-tools/35.0.0/apksigner"
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          echo "Verifying: $APK_PATH"
          CERT_OUTPUT="$("$APKSIGNER" verify --print-certs "$APK_PATH")"
          echo "$CERT_OUTPUT"
          if echo "$CERT_OUTPUT" | grep -q "CN=Android Debug"; then
            echo "ERROR: Release APK is signed with a DEBUG certificate. Google Play will reject it."
            exit 1
          fi
          echo "OK: Release APK is signed with a non-debug certificate."

      # ------------------------------------------------------------------
      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: kickplan-training-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Upload release AAB (Google Play upload target)
        uses: actions/upload-artifact@v4
        with:
          name: kickplan-training-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
